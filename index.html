<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>TCS Home</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			background: #f4f6f8;
			margin: 0;
			padding: 0;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			height: 100vh;
		}
		.container {
			background: #fff;
			padding: 40px 30px;
			border-radius: 12px;
			box-shadow: 0 4px 16px rgba(0,0,0,0.08);
			text-align: center;
		}
		h1 {
			color: #0078d4;
			margin-bottom: 16px;
		}
		p {
			color: #333;
			font-size: 1.2em;
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>Welcome to TCS</h1>
		<p>Your trusted technology partner.</p>
	</div>
</body>
</html>

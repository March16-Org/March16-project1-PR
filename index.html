<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>TCS Home</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			background: #f4f6f8;
			margin: 0;
			padding: 0;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: flex-start;
			min-height: 100vh;
		}
		.navbar {
			width: 100%;
			background: #0078d4;
			padding: 16px 0;
			display: flex;
			justify-content: center;
			box-shadow: 0 2px 8px rgba(0,0,0,0.05);
		}
		.navbar a {
			color: #fff;
			text-decoration: none;
			margin: 0 24px;
			font-size: 1.1em;
			font-weight: 500;
			transition: color 0.2s;
		}
		.navbar a:hover {
			color: #ffd700;
		}
		.container {
			background: #fff;
			padding: 40px 30px;
			border-radius: 12px;
			box-shadow: 0 4px 16px rgba(0,0,0,0.08);
			text-align: center;
			margin-top: 40px;
		}
		h1 {
			color: #0078d4;
			margin-bottom: 16px;
		}
		p {
			color: #333;
			font-size: 1.2em;
		}
		.support-section {
			margin-top: 32px;
			background: #f0f4ff;
			padding: 24px;
			border-radius: 8px;
			box-shadow: 0 2px 8px rgba(0,120,212,0.05);
		}
		.support-section h2 {
			color: #0078d4;
			margin-bottom: 12px;
		}
		.support-section p {
			color: #222;
			font-size: 1em;
		}
	</style>
</head>
<body>
	<div class="navbar">
		<a href="#home">Home</a>
		<a href="#support">Support</a>
	</div>
	<div class="container" id="home">
		<h1>Welcome to TCS</h1>
		<p>Your trusted technology partner.</p>
	</div>
	<div class="support-section" id="support">
		<h2>Support</h2>
		<p>If you need assistance, please contact our support team at <a href="mailto:support@tcs.com">support@tcs.com</a> or call 1-800-TCS-HELP.</p>
	</div>
</body>
</html>
